name: CI - Lint & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        # uv sync installe ruff et pytest s'ils sont dans ton pyproject.toml
        run: uv sync --frozen

      - name: Run Ruff (Linter)
        # On vérifie la syntaxe et les erreurs potentielles
        run: uv run ruff check .

      - name: Run Ruff (Formatter check)
        # On vérifie que le code est bien formaté (équivalent Black)
        run: uv run ruff format --check .

      - name: Run Pytest
        # Exécution des tests unitaires
        run: uv run pytest